<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>독서토론 — JARVIS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="grid-bg"></div>
  <div class="scan-line"></div>

  <header class="hud-header">
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <span class="hud-title">JARVIS<span class="hud-sub"> — 독서토론 시스템</span></span>
    <div class="hud-status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">오프라인</span>
    </div>
  </header>

  <main class="main-layout">

    <aside class="side-panel left-panel">
      <div class="panel-label">// PERSONA</div>
      <select id="personaSelect" class="hud-select">
        <option value="">— 선택 —</option>
      </select>

      <div class="panel-label" style="margin-top:1.5rem;">// BOOK CONTEXT</div>
      <select id="bookSelect" class="hud-select">
        <option value="">— 없음 —</option>
      </select>

      <button id="initBtn" class="hud-btn"><span>▶ 세션 시작</span></button>

      <div class="panel-divider"></div>
      <div class="panel-label">// VOICE</div>

      <div class="voice-row">
        <span class="voice-label">SPEED</span>
        <div class="seg-group" id="rateGroup">
          <button class="seg-btn" data-idx="0" title="매우 느림">1</button>
          <button class="seg-btn" data-idx="1" title="느림">2</button>
          <button class="seg-btn active" data-idx="2" title="보통">3</button>
          <button class="seg-btn" data-idx="3" title="빠름">4</button>
          <button class="seg-btn" data-idx="4" title="매우 빠름">5</button>
        </div>
      </div>

      <div class="voice-row">
        <span class="voice-label">PITCH</span>
        <div class="seg-group" id="pitchGroup">
          <button class="seg-btn" data-idx="0" title="매우 낮음">1</button>
          <button class="seg-btn" data-idx="1" title="낮음">2</button>
          <button class="seg-btn active" data-idx="2" title="보통">3</button>
          <button class="seg-btn" data-idx="3" title="높음">4</button>
          <button class="seg-btn" data-idx="4" title="매우 높음">5</button>
        </div>
      </div>

      <div class="panel-divider"></div>
      <div class="panel-label">// SESSION LOG</div>
      <div id="sessionLog" class="session-log"></div>
    </aside>

    <section class="center-panel">
      <div class="orb-container" id="orbContainer">

        <!-- HUD 모서리 브라켓 -->
        <div class="hud-mark tl"></div>
        <div class="hud-mark tr"></div>
        <div class="hud-mark bl"></div>
        <div class="hud-mark br"></div>

        <!-- 외부 링들 -->
        <div class="ring ring-outer"></div>
        <div class="ring ring-outer-dash"></div>
        <div class="ring ring-mid"></div>
        <div class="ring ring-tilt"></div>
        <div class="ring ring-inner"></div>

        <!-- 궤도 점 3개 -->
        <div class="orbit orbit-a"><span class="orbit-dot"></span></div>
        <div class="orbit orbit-b"><span class="orbit-dot sm"></span></div>
        <div class="orbit orbit-c"><span class="orbit-dot sm"></span></div>

        <!-- 스캔 빔 -->
        <div class="orb-scan"></div>

        <!-- 중심 오브 -->
        <div class="orb-core" id="orbCore">
          <div class="orb-spin orb-spin-a"></div>
          <div class="orb-spin orb-spin-b"></div>
          <div class="orb-pulse"></div>
          <div class="orb-pulse orb-pulse-2"></div>
          <div class="orb-icon" id="orbIcon">◈</div>
        </div>

        <!-- 리스닝 파형 (선형) -->
        <div class="waveform" id="waveform">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>

        <!-- 스피킹 파형 (원형 SVG — JS가 생성) -->
        <!-- circularWave는 main.js에서 동적 삽입 -->

      </div>

      <div class="state-label" id="stateLabel">시스템 준비 중</div>

      <button class="mic-btn" id="micBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span>말하기</span>
      </button>
    </section>

    <aside class="side-panel right-panel">
      <div class="panel-label">// TRANSCRIPT</div>
      <div id="transcript" class="transcript-area"></div>
    </aside>

  </main>

  <div class="response-bar" id="responseBar">
    <div class="response-text" id="responseText">페르소나와 책을 선택하고 세션을 시작하세요.</div>
  </div>

  <script src="main.js"></script>
</body>
</html>
